<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>🥁 DrumBeast</title>
    <!-- REQUIRED METADATA -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- TOP CONTROLS (Outside the scaling screen) -->
    <button id="mobile-btn">📱 Fullscreen</button>
    <button id="toggle-sounds-btn">🪣 Sound Kits</button>
    <button id="toggle-panel-btn">🎹 Beat Sequencer</button>
    <button id="dark-mode-toggle">☀️ Light Mode</button>

    <!-- GAME CONTAINER (Wraps the content to be scaled) -->
    <div id="game-container">
        <!-- THE SCREEN: Fixed resolution internal logic -->
        <div id="screen">
            <h1>🥁 DrumBeast</h1>

            <div id="audio-status">Click a pad to start</div>
            <div id="note-display">&nbsp;</div>

            <div class="controls-container">
                <label for="gain-slider">Gain</label>
                <input type="range" id="gain-slider" min="0.1" max="2.0" step="0.05" value="1.0">
                
                <label for="volume-slider" style="margin-left: 15px;">Volume</label>
                <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.8">
            </div>

            <div class="timing-controls-container">
                <div class="timing-group">
                    <input type="checkbox" id="metronome-toggle">
                    <label for="metronome-toggle">Metronome</label>
                    <label for="bpm-slider" class="bpm-label">BPM: <span id="bpm-display">120</span></label>
                    <input type="range" id="bpm-slider" min="60" max="240" step="1" value="120">
                </div>
                <div class="timing-group">
                    <input type="checkbox" id="turbo-toggle">
                    <label for="turbo-toggle">Turbo Beat</label>
                    <select id="turbo-division">
                        <option value="4">1/4</option>
                        <option value="8">1/8</option>
                        <option value="16" selected>1/16</option>
                        <option value="32">1/32</option>
                    </select>
                </div>
            </div>

            <div id="keyboard" class="drum-pads">
                <div class="row">
                    <kbd data-key="q">Kick</kbd>
                    <kbd data-key="w">Snare</kbd>
                    <kbd data-key="e">Hat (C)</kbd>
                    <kbd data-key="r">Hat (O)</kbd>
                </div>
                <div class="row">
                    <kbd data-key="a">Tom 1</kbd>
                    <kbd data-key="s">Tom 2</kbd>
                    <kbd data-key="d">Tom 3</kbd>
                    <kbd data-key="f">Crash</kbd>
                </div>
                <div class="row">
                    <kbd data-key="z">Clap</kbd>
                    <kbd data-key="x">Rimshot</kbd>
                    <kbd data-key="v">Ride</kbd>
                    <kbd data-key="b">Tamb</kbd>
                </div>
                 <div class="row">
                    <kbd data-key="n">808 Kick</kbd>
                    <kbd data-key="m">808 Snare</kbd>
                </div>
            </div>

            <div class="instructions">Use keyboard keys: QWER, ASDF, ZXVBNM</div>
        </div>
    </div>

    <!-- SEQUENCER PANEL (Outside screen so it doesn't get scaled/clipped) -->
    <div id="sequencer-panel" class="side-panel">
        <h2>Beat Sequencer</h2>
        <button id="record-btn">⏺️ Record Beat</button>
        <button id="play-btn" disabled>▶️ Play</button>
        <button id="stop-playback-btn" disabled>⏹️ Stop Playback</button>
        <textarea id="note-sequence-display" placeholder="Recorded drum hits will appear here... (Editable JSON)"></textarea>
        <div id="sequence-clipboard-buttons">
            <button id="copy-sequence-btn">📄 Copy</button>
            <button id="paste-sequence-btn">📋 Paste</button>
        </div>
        <button id="export-btn" disabled>📤 Export Beat</button>
        <label for="import-file-input" class="button-like-label">📥 Import Beat</label>
        <input type="file" id="import-file-input" accept=".json">
        <button id="clear-sequence-btn">🗑️ Clear Beat</button>
    </div>

    <!-- SOUND KITS PANEL -->
    <div id="sounds-panel" class="side-panel">
        <h2>Sound Kits</h2>
        <p style="font-size: 0.9em; margin-bottom: 20px;">Select a drum kit to change the pad sounds:</p>
        <button class="kit-btn active" data-kit="standard">🥁 Standard Kit</button>
        <button class="kit-btn" data-kit="tinBucket">🪣 Tin Bucket Kit</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
